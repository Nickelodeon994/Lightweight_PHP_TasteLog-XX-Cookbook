<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XX的食谱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.icon-svg { width: 1em; height: 1em; vertical-align: middle; }
.icon-svg-sm { width: 18px; height: 18px; vertical-align: middle; }
.icon-svg-lg { width: 24px; height: 24px; vertical-align: middle; }

:root {
    --primary: #2ecc71;
    --primary-dark: #27ae60;
    --primary-light: #58d68d;
    --bg-gradient-start: #e8f5e9;
    --bg-gradient-end: #c8e6c9;
    --glass-bg: rgba(255, 255, 255, 0.72);
    --glass-border: rgba(255, 255, 255, 0.4);
    --glass-shadow: 0 8px 32px rgba(46, 204, 113, 0.12);
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 20px;
    --radius-sm: 12px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --input-bg: rgba(255,255,255,0.6);
    --input-focus-bg: rgba(255,255,255,0.9);
    --btn-secondary-bg: rgba(255,255,255,0.6);
    --btn-secondary-hover-bg: rgba(255,255,255,0.8);
    --shadow-color: rgba(46, 204, 113, 0.12);
    --shadow-hover-color: rgba(46, 204, 113, 0.18);
    --danger-shadow-color: rgba(239, 68, 68, 0.3);
    --border-light-color: rgba(46, 204, 113, 0.15);
    --focus-shadow-color: rgba(46, 204, 113, 0.1);
    --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

[data-theme="dark"] {
    --bg-gradient-start: #0f1419;
    --bg-gradient-end: #1a2332;
    --glass-bg: rgba(26, 35, 50, 0.85);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    --text-primary: #e8ecf0;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --input-bg: rgba(30, 41, 59, 0.8);
    --input-focus-bg: rgba(30, 41, 59, 0.95);
    --btn-secondary-bg: rgba(55, 65, 81, 0.6);
    --btn-secondary-hover-bg: rgba(55, 65, 81, 0.8);
    --shadow-color: rgba(0, 0, 0, 0.2);
    --shadow-hover-color: rgba(0, 0, 0, 0.3);
    --danger-shadow-color: rgba(239, 68, 68, 0.4);
    --border-light-color: rgba(46, 204, 113, 0.25);
    --focus-shadow-color: rgba(46, 204, 113, 0.2);
    --card-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: var(--radius);
}

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: var(--radius);
    transition: var(--transition);
}

.glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--shadow-hover-color);
}

.glass-btn {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    font-family: inherit;
    font-size: 14px;
}

.glass-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
}

.glass-btn:active { transform: translateY(0); }

.glass-btn.secondary {
    background: var(--btn-secondary-bg);
    color: var(--text-primary);
    box-shadow: var(--card-shadow);
}

.glass-btn.secondary:hover {
    background: var(--btn-secondary-hover-bg);
}

.glass-btn.danger {
    background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
    box-shadow: 0 4px 15px var(--danger-shadow-color);
}

.glass-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border-light-color);
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    font-family: inherit;
    font-size: 15px;
    transition: var(--transition);
    outline: none;
    color: var(--text-primary);
}

.glass-input:focus {
    border-color: var(--primary);
    background: var(--input-focus-bg);
    box-shadow: 0 0 0 4px var(--focus-shadow-color);
}

.glass-input::placeholder { color: var(--text-muted); }

.top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-logo {
    width: 40px; height: 40px;
    border-radius: 12px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 18px;
}

.nav-title {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.nav-center {
    display: flex;
    gap: 8px;
}

.nav-tab {
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-weight: 500;
    font-size: 15px;
    color: var(--text-secondary);
    transition: var(--transition);
    border: none;
    background: transparent;
    font-family: inherit;
}

.nav-tab:hover { color: var(--primary); background: rgba(46, 204, 113, 0.08); }
.nav-tab.active { color: var(--primary); background: rgba(46, 204, 113, 0.12); font-weight: 600; }

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.nav-user {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
}

.nav-user:hover { background: rgba(46, 204, 113, 0.08); }

.nav-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary-light);
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 16px;
}

.nav-username { font-weight: 600; font-size: 14px; }

.mobile-top-actions {
    display: none;
    align-items: center;
    gap: 16px;
}

.mobile-icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(46, 204, 113, 0.1);
    color: var(--primary);
    border: none;
    cursor: pointer;
    font-size: 20px;
    transition: var(--transition);
}

.mobile-icon-btn:hover { background: rgba(46, 204, 113, 0.2); }

.bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--glass-border);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
}

.bottom-nav-inner {
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.bottom-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    cursor: pointer;
    color: var(--text-muted);
    transition: var(--transition);
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 11px;
}

.bottom-tab .icon { font-size: 22px; line-height: 1; }
.bottom-tab.active { color: var(--primary); }
.bottom-tab.active .icon { transform: scale(1.1); }

.desktop-search {
    position: fixed;
    left: 20px;
    bottom: 20px;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
}

.search-trigger {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(46, 204, 113, 0.35);
    transition: var(--transition);
}

.search-trigger:hover { transform: scale(1.05); }

.search-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 6px 6px 6px 20px;
    box-shadow: var(--glass-shadow);
    animation: slideInLeft 0.3s ease;
}

.search-bar.active { display: flex; }

.search-bar input {
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 15px;
    width: 280px;
    color: var(--text-primary);
}

.search-bar input::placeholder { color: var(--text-muted); }

.search-submit {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: var(--transition);
}

.search-submit:hover { background: var(--primary-dark); }

.main-content {
    padding-top: 84px;
    padding-bottom: 40px;
    max-width: 720px;
    margin: 0 auto;
    padding-left: 24px;
    padding-right: 24px;
}

.post-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
    margin-bottom: 20px;
    overflow: hidden;
    transition: var(--transition);
}

.post-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(46, 204, 113, 0.15);
}

.post-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px 12px;
}

.post-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary-light);
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 18px;
    flex-shrink: 0;
    cursor: pointer;
}

.post-author-info { flex: 1; min-width: 0; }
.post-author-name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.post-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
    color: white;
    font-size: 11px;
    font-weight: 600;
}

.post-time {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
}

.post-body {
    padding: 0 20px 12px;
}

.post-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.4;
    cursor: pointer;
}

.post-title:hover { color: var(--primary-dark); }

.post-content {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    word-break: break-word;
}

.post-content .expand-btn {
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    margin-left: 4px;
}

.post-media {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}

.post-media::-webkit-scrollbar { display: none; }

.media-item {
    flex-shrink: 0;
    width: 200px;
    height: 200px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    scroll-snap-align: start;
    cursor: pointer;
    position: relative;
    background: rgba(0,0,0,0.05);
}

.media-item img, .media-item video {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: var(--transition);
}

.media-item:hover img, .media-item:hover video { transform: scale(1.05); }

.media-item.video::after {
    content: '▶';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 48px; height: 48px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    backdrop-filter: blur(4px);
}

.post-actions {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid rgba(46, 204, 113, 0.08);
    gap: 8px;
}

.action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
}

.action-btn:hover { background: rgba(46, 204, 113, 0.08); color: var(--primary); }
.action-btn.active { color: var(--primary); background: rgba(46, 204, 113, 0.1); }
.action-btn.active.like { color: var(--primary); }
.action-btn.active.dislike { color: var(--danger); }
.action-btn.active.favorite { color: var(--warning); }

.action-btn .icon { font-size: 18px; }

.fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 6px 24px rgba(46, 204, 113, 0.4);
    transition: var(--transition);
    z-index: 998;
}

.fab:hover { transform: scale(1.08) rotate(90deg); }

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
}

.modal-overlay.active { display: flex; }

.modal {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(46, 204, 113, 0.08);
}

.modal-title { font-size: 20px; font-weight: 700; }

.modal-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.05);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.modal-close:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

.modal-body { padding: 20px 24px; }

.modal-footer {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding: 16px 24px 20px;
    border-top: 1px solid rgba(46, 204, 113, 0.08);
}

.media-preview {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.media-preview-item {
    width: 100px; height: 100px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    position: relative;
    background: rgba(0,0,0,0.05);
}

.media-preview-item img, .media-preview-item video {
    width: 100%; height: 100%;
    object-fit: cover;
}

.media-preview-item .remove-media {
    position: absolute;
    top: 4px; right: 4px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.media-upload-btn {
    width: 100px; height: 100px;
    border-radius: var(--radius-sm);
    border: 2px dashed rgba(46, 204, 113, 0.3);
    background: rgba(46, 204, 113, 0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--primary);
    font-size: 13px;
    gap: 4px;
    transition: var(--transition);
}

.media-upload-btn:hover {
    border-color: var(--primary);
    background: rgba(46, 204, 113, 0.08);
}

.media-upload-btn .icon { font-size: 24px; }

.auth-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}

.auth-tab {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: var(--transition);
}

.auth-tab.active {
    background: rgba(46, 204, 113, 0.1);
    color: var(--primary);
}

.auth-form { display: none; }
.auth-form.active { display: block; }

.form-group { margin-bottom: 16px; }
.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
}

.search-page-header {
    margin-bottom: 24px;
}

.search-page-header h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
}

.search-page-header p { color: var(--text-muted); }

.mobile-search-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    display: none;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
}

.mobile-search-overlay.active { display: flex; }

.mobile-search-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
}

.mobile-search-header input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 18px;
    outline: none;
    color: var(--text-primary);
}

.mobile-search-header input::placeholder { color: var(--text-muted); }

.mobile-search-close {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.05);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.mobile-search-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
}

.profile-header {
    text-align: center;
    padding: 32px 24px;
    margin-bottom: 24px;
}

.profile-avatar-large {
    width: 100px; height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--primary-light);

<script>
const API_BASE = 'api.php?action=';
const MAX_MEDIA_PER_POST = 9;
let currentUser = null;
let currentPage = 'explore';
let currentPageNum = 1;
let currentViewUid = null;
let selectedMediaFiles = [];
let currentReportPostId = '';
let calendarCurrentDate = new Date();
let profileCurrentTab = 'posts';
let adminCurrentTab = 'users';
let isSearchBarOpen = false;

document.addEventListener('DOMContentLoaded', () => {
    initApp();
});

async function initApp() {
    await checkLogin();
    await loadSettings();
    setupNavigation();
    setupHashRouter();
    lucide.createIcons();
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        applyTheme();
    });
    
    const hash = window.location.hash.replace('#', '') || 'explore';
    navigateTo(hash);
}

async function api(action, params = {}, method = 'GET') {
    const url = API_BASE + action;
    const options = { method };
    
    if (method === 'POST') {
        if (params instanceof FormData) {
            options.body = params;
        } else {
            options.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
            options.body = new URLSearchParams(params).toString();
        }
    } else {
        if (Object.keys(params).length > 0) {
            options.method = 'GET';
        }
    }
    
    const fullUrl = method === 'GET' && Object.keys(params).length > 0 
        ? url + '&' + new URLSearchParams(params).toString()
        : url;
    
    try {
        const res = await fetch(fullUrl, options);
        const data = await res.json();
        return data;
    } catch (err) {
        showToast('网络错误，请稍后重试', 'error');
        throw err;
    }
}

async function loadSettings() {
    const data = await api('getSettings');
    if (data.success) {
        document.getElementById('siteTitle').textContent = data.site_title || 'XX的食谱';
        document.title = data.site_title || 'XX的食谱';
        if (data.site_icon) {
            document.getElementById('siteIcon').innerHTML = `<img src="${data.site_icon}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`;
        }
        applyTheme();
    }
}

function applyTheme() {
    api('getSettings').then(settings => {
        if (!settings.success) return;
        const mode = settings.theme_mode || 'auto';
        if (mode === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (mode === 'light') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }
    });
}

function setupNavigation() {
    document.querySelectorAll('.nav-tab, .bottom-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const page = tab.dataset.page;
            if (page) navigateTo(page);
        });
    });
}

function setupHashRouter() {
    window.addEventListener('hashchange', () => {
        const hash = window.location.hash.replace('#', '') || 'explore';
        navigateTo(hash, false);
    });
}

function navigateTo(page, updateHash = true) {
    if (updateHash) {
        window.location.hash = page;
    }
    
    currentPage = page;
    currentPageNum = 1;
    
    document.querySelectorAll('.nav-tab, .bottom-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.page === page);
    });
    
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    
    switch (page) {
        case 'explore': renderExplorePage(main); break;
        case 'follow': renderFollowPage(main); break;
        case 'favorite': renderFavoritePage(main); break;
        case 'checkin': renderCheckinPage(main); break;
        case 'profile': renderProfilePage(main); break;
        case 'admin': renderAdminPage(main); break;
        default:
            if (page === 'search' || page.startsWith('search?')) {
                renderSearchPage(main);
            } else if (page.startsWith('post/')) {
                const postId = page.replace('post/', '');
                renderPostDetailPage(main, postId);
            } else if (page.startsWith('user/')) {
                const uid = page.replace('user/', '');
                renderUserProfilePage(main, uid);
            } else {
                renderExplorePage(main);
            }
    }
    
    window.scrollTo(0, 0);
    lucide.createIcons();
}

async function loadPosts(type, containerId, paginationId, keyword = '', uid = null) {
    const container = document.getElementById(containerId);
    const pagination = document.getElementById(paginationId);
    
    container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    
    const params = { type, page: currentPageNum, limit: 10 };
    if (keyword) params.keyword = keyword;
    if (uid) params.uid = uid;
    
    try {
        const data = await api('getPosts', params);
        if (!data.success) {
            container.innerHTML = renderEmptyState('😕', '加载失败', data.message);
            return;
        }
        
        if (data.posts.length === 0) {
            const emptyMsgs = {
                explore: ['<i data-lucide="chef-hat"></i>', '还没有食谱', '成为第一个分享美食的人吧！'],
                follow: ['<i data-lucide="users"></i>', '暂无动态', '关注更多用户，发现精彩食谱'],
                favorite: ['<i data-lucide="star"></i>', '暂无收藏', '看到喜欢的食谱就收藏起来吧'],
                search: ['<i data-lucide="search"></i>', '未找到结果', '换个关键词试试'],
                user_posts: ['<i data-lucide="file-text"></i>', '暂无帖子', '该用户还没有发布过内容']
            };
            const [icon, title, desc] = emptyMsgs[type] || ['<i data-lucide="inbox"></i>', '暂无内容', ''];
            container.innerHTML = renderEmptyState(icon, title, desc);
            lucide.createIcons();
            if (pagination) pagination.innerHTML = '';
            return;
        }
        
        container.innerHTML = data.posts.map(post => renderPostCard(post)).join('');
        lucide.createIcons();
        
        if (pagination) {
            pagination.innerHTML = renderPagination(data.total, data.page, data.limit, () => {
                currentPageNum++;
                loadPosts(type, containerId, paginationId, keyword, uid);
            }, () => {
                currentPageNum--;
                loadPosts(type, containerId, paginationId, keyword, uid);
            });
        }
    } catch (e) {
        container.innerHTML = renderEmptyState('😕', '加载失败', '请检查网络连接');
    }
}

function renderPostCard(post) {
    const author = post.author || {};
    const avatarHtml = author.avatar
        ? `<img src="${author.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : (author.username || 'U').charAt(0).toUpperCase();
    
    const badgeHtml = author.badge ? `<span class="post-badge">${escapeHtml(author.badge)}</span>` : '';
    
    let contentHtml = escapeHtml(post.content || '');
    const isLong = contentHtml.length > 200;
    if (isLong) {
        contentHtml = `<span class="content-short">${contentHtml.substring(0, 200)}...</span><span class="content-full hidden">${contentHtml}</span><span class="expand-btn" onclick="toggleContent(this)">查看全文</span>`;
    }
    
    const mediaHtml = (post.media || []).map((m, i) => {
        if (m.type === 'video') {
            return `<div class="media-item video" onclick="openImageViewer('${m.url}', 'video')"><video src="${m.url}" preload="metadata"></video></div>`;
        }
        return `<div class="media-item" onclick="openImageViewer('${m.url}', 'image')"><img src="${m.thumb || m.url}" alt=""></div>`;
    }).join('');
    
    const timeStr = formatTime(post.created_at);
    const isOwner = currentUser && currentUser.uid == post.uid;
    
    return `
        <div class="post-card">
            <div class="post-header">
                <div class="post-avatar" onclick="navigateTo('user/${post.uid}')">${avatarHtml}</div>
                <div class="post-author-info">
                    <div class="post-author-name">${escapeHtml(author.username || '未知用户')}${badgeHtml}</div>
                    <div class="post-time">${timeStr}</div>
                </div>
            </div>
            <div class="post-body">
                <div class="post-title" onclick="navigateTo('post/${post.id}')">${escapeHtml(post.title || '')}</div>
                <div class="post-content">${contentHtml}</div>
            </div>
            ${mediaHtml ? `<div class="post-media">${mediaHtml}</div>` : ''}
            <div class="post-actions">
                <button class="action-btn ${post.user_reaction === 'like' ? 'active like' : ''}" onclick="handleReact('${post.id}', 'like', this)">
                    <span class="icon"><i data-lucide="thumbs-up"></i></span>
                    <span class="count">${post.likes || 0}</span>
                </button>
                <button class="action-btn ${post.user_reaction === 'dislike' ? 'active dislike' : ''}" onclick="handleReact('${post.id}', 'dislike', this)">
                    <span class="icon"><i data-lucide="thumbs-down"></i></span>
                    <span class="count">${post.dislikes || 0}</span>
                </button>
                <button class="action-btn ${post.is_favorite ? 'active favorite' : ''}" onclick="handleFavorite('${post.id}', this)">
                    <span class="icon"><i data-lucide="star"></i></span>
                    <span class="count">${post.favorites || 0}</span>
                </button>
                ${isOwner ? `<button class="action-btn" onclick="showEditPostModal('${post.id}')"><span class="icon"><i data-lucide="edit-3"></i></span></button>` : ''}
                <button class="action-btn" onclick="showReportModal('${post.id}')">
                    <span class="icon"><i data-lucide="flag"></i></span>
                    <span>举报</span>
                </button>
            </div>
        </div>
    `;
}

function toggleContent(btn) {
    const card = btn.closest('.post-content');
    const short = card.querySelector('.content-short');
    const full = card.querySelector('.content-full');
    if (short.classList.contains('hidden')) {
        short.classList.remove('hidden');
        full.classList.add('hidden');
        btn.textContent = '查看全文';
    } else {
        short.classList.add('hidden');
        full.classList.remove('hidden');
        btn.textContent = '收起';
    }
}

async function loadProfileContent() {
    const container = document.getElementById('profileContent');
    const pagination = document.getElementById('profilePagination');
    
    container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    
    if (profileCurrentTab === 'history') {
        try {
            const data = await api('getBrowseHistory');
            if (!data.success || !data.posts || data.posts.length === 0) {
                container.innerHTML = renderEmptyState('<i data-lucide="book-open"></i>', '暂无浏览记录', '');
                pagination.innerHTML = '';
                return;
            }
            container.innerHTML = data.posts.map(post => renderPostCard(post)).join('');
            lucide.createIcons();
            pagination.innerHTML = '';
        } catch (e) {
            container.innerHTML = renderEmptyState('😕', '加载失败', '');
        }
        return;
    }
    
    const typeMap = { posts: 'user_posts', liked: 'liked', following: 'following' };
    const type = typeMap[profileCurrentTab] || 'user_posts';
    
    if (profileCurrentTab === 'following') {
        try {
            const data = await api('getUserPosts', { uid: currentUser.uid, type: 'following', page: currentPageNum, limit: 10 });
            if (!data.success || !data.posts || data.posts.length === 0) {
                container.innerHTML = renderEmptyState('<i data-lucide="users"></i>', '暂无关注', '去发现有趣的用户吧');
                pagination.innerHTML = '';
                return;
            }
            const filteredUsers = data.posts.filter(u => u.uid !== currentUser.uid);
            if (filteredUsers.length === 0) {
                container.innerHTML = renderEmptyState('<i data-lucide="users"></i>', '暂无关注', '去发现有趣的用户吧');
                pagination.innerHTML = '';
                return;
            }
            container.innerHTML = filteredUsers.map(u => `
                <div class="post-card" style="display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;" onclick="navigateTo('user/${u.uid}')">
                    <div class="post-avatar">${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (u.username || 'U').charAt(0).toUpperCase()}</div>
                    <div style="flex:1;">
                        <div style="font-weight:600;">${escapeHtml(u.username)} ${u.badge ? `<span class="post-badge">${escapeHtml(u.badge)}</span>` : ''}</div>
                        <div style="font-size:13px;color:var(--text-muted);">UID: ${u.uid}</div>
                    </div>
                    <button class="glass-btn secondary" style="padding:8px 16px;font-size:13px;" onclick="event.stopPropagation();handleFollow(${u.uid}, this)">已关注</button>
                </div>
            `).join('');
            pagination.innerHTML = renderPagination(data.total, data.page, data.limit, () => {
                currentPageNum++;
                loadProfileContent();
            }, () => {
                currentPageNum--;
                loadProfileContent();
            });
        } catch (e) {
            container.innerHTML = renderEmptyState('😕', '加载失败', '');
        }
        return;
    }
    
    if (profileCurrentTab === 'liked') {
        loadPosts('liked', 'profileContent', 'profilePagination');
        return;
    }
    
    loadPosts(type, 'profileContent', 'profilePagination', '', currentUser.uid);
}

function renderCalendar(dates) {
    const year = calendarCurrentDate.getFullYear();
    const month = calendarCurrentDate.getMonth();
    document.getElementById('calendarMonthLabel').textContent = `${year}年${month + 1}月`;
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDay = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    
    const prevLastDay = new Date(year, month, 0).getDate();
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    
    let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');
    
    for (let i = startDay - 1; i >= 0; i--) {
        html += `<div class="calendar-day other-month">${prevLastDay - i}</div>`;
    }
    
    const today = new Date();
    const dateStrs = dates.map(d => d);
    
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
        const isChecked = dateStrs.includes(dateStr);
        
        let classes = 'calendar-day';
        if (isToday) classes += ' today';
        if (isChecked) classes += ' checked';
        
        html += `<div class="${classes}" data-date="${dateStr}">${d}</div>`;
    }
    
    const remaining = (7 - ((startDay + daysInMonth) % 7)) % 7;
    for (let d = 1; d <= remaining; d++) {
        html += `<div class="calendar-day other-month">${d}</div>`;
    }
    
    document.getElementById('calendarGrid').innerHTML = html;
}

function handleMediaSelect(e) {
    const files = Array.from(e.target.files);
    const preview = document.getElementById('mediaPreview');
    const remaining = MAX_MEDIA_PER_POST - selectedMediaFiles.length;
    const toAdd = files.slice(0, remaining);
    
    toAdd.forEach(file => {
        selectedMediaFiles.push(file);
        const url = URL.createObjectURL(file);
        const isVideo = file.type.startsWith('video');
        const div = document.createElement('div');
        div.className = 'media-preview-item';
        div.innerHTML = `
            ${isVideo ? `<video src="${url}"></video>` : `<img src="${url}" alt="">`}
            <button class="remove-media" onclick="removeMedia(this, '${url}')">×</button>
        `;
        preview.insertBefore(div, preview.lastElementChild);
    });
    
    if (selectedMediaFiles.length >= MAX_MEDIA_PER_POST) {
        preview.lastElementChild.style.display = 'none';
    }
}

function removeMedia(btn, url) {
    const idx = selectedMediaFiles.findIndex(f => URL.createObjectURL(f) === url);
    if (idx > -1) selectedMediaFiles.splice(idx, 1);
    btn.parentElement.remove();
    document.getElementById('mediaPreview').lastElementChild.style.display = 'flex';
}

        <div class="media-upload-btn" onclick="document.getElementById('mediaInput').click()">
            <span class="icon">📷</span>
            <span>添加</span>
        </div>
    `;
    selectedMediaFiles = [];
}

function openImageViewer(url, type) {
    const viewer = document.getElementById('imageViewer');
    const img = document.getElementById('viewerImage');
    const video = document.getElementById('viewerVideo');
    
    if (type === 'video') {
        img.style.display = 'none';
        video.style.display = 'block';
        video.src = url;
        video.play();
    } else {
        video.style.display = 'none';
        video.pause();
        img.style.display = 'block';
        img.src = url;
    }
    
    viewer.classList.add('active');
}

function closeImageViewer() {
    const viewer = document.getElementById('imageViewer');
    const video = document.getElementById('viewerVideo');
    viewer.classList.remove('active');
    video.pause();
    video.src = '';
}

function showEditProfileModal() {
    const name = prompt('请输入新昵称（2-20字符）：');
    if (!name) return;
    if (name.length < 2 || name.length > 20) { showToast('昵称长度2-20字符', 'warning'); return; }
    
    const badge = prompt('请输入徽章文字（可选）：') || '';
    
    api('updateProfile', { username: name, badge }, 'POST').then(data => {
        if (data.success) {
            showToast('资料已更新');
            navigateTo('profile');
        } else {
            showToast(data.message || '更新失败', 'error');
        }
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(timeStr) {
    if (!timeStr) return '';
    const date = new Date(timeStr.replace(' ', 'T'));
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
    
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
}

function renderEmptyState(icon, title, desc) {
    return `
        <div class="empty-state">
            <div class="icon">${icon}</div>
            <h3>${title}</h3>
            <p>${desc}</p>
        </div>
    `;
}

function renderPagination(total, page, limit, onNext, onPrev) {
    const totalPages = Math.ceil(total / limit);
    if (totalPages <= 1) return '';
    
    let html = '<div class="pagination">';
    html += `<button ${page <= 1 ? 'disabled' : ''} onclick="onPrev()">上一页</button>`;
    html += `<button class="active">${page} / ${totalPages}</button>`;
    html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="onNext()">下一页</button>`;
    html += '</div>';
    return html;
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
            overlay.classList.remove('active');
        }
    });
});
</script>
</body>
</html>
